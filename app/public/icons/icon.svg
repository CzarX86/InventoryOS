<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#080808"/>
  <!-- Grid lines -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="#1a1a1a" stroke-width="1"/>
  <!-- "I" mark top-left -->
  <rect x="40" y="40" width="6" height="6" fill="#333"/>
  <!-- White box background for letters -->
  <rect x="80" y="160" width="352" height="192" fill="#ffffff"/>
  <!-- "OS" text in black -->
  <text x="256" y="298" font-family="Arial Black, sans-serif" font-weight="900" font-size="128" fill="#000000" text-anchor="middle" letter-spacing="-4">OS</text>
  <!-- Bottom label -->
  <text x="256" y="440" font-family="Courier New, monospace" font-weight="700" font-size="22" fill="#333333" text-anchor="middle" letter-spacing="8">INVENTORY</text>
  <!-- Corner marks -->
  <rect x="40" y="460" width="20" height="2" fill="#2a2a2a"/>
  <rect x="452" y="460" width="20" height="2" fill="#2a2a2a"/>
</svg>
